<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/NhkDNdkG1.mp4","📍S3P1 RVM4H J4D1 S4L4H 4R4H"],
  ["https://cdn2.videy.co/2DYgQ5YI1.mp4","📍T1D4K NY4NGK4 B1S4 J4D1"],
  ["https://cdn2.videy.co/Y21o1XLL1.mp4","📍K3J4D14N K3C1L B3RVJ0NG P4N4S"],
  ["https://cdn2.videy.co/OiAV2efA1.mp4","📍M4L4H T4MB4H BR4N1"],
  ["https://cdn2.videy.co/HCJQYnOr1.mp4","📍S4L4H L4NGK4H D1 M4L4M H3N1NG"],
  ["https://cdn2.videy.co/8THrwqtY1.mp4","📍D14M D14M 51TV451 B3RVB4H"],
  ["https://cdn2.videy.co/cxGvojvW1.mp4","📍K3P1NCVT 54M4 S3NYP1"],
  ["https://cdn2.videy.co/0tNMmWrR1.mp4","📍M0M3N T4K T3RC4T4T"],
  ["https://cdn2.videy.co/FyplVPtM1.mp4","📍T1D4K D1R3NC4N4 K3J4D14N NY4"],
  ["https://cdn2.videy.co/YLhGaRWo1.mp4","📍B4RV S4D4R S44T T3RL4MB4T"],
  ["https://cdn2.videy.co/Xqdh02fJ1.mp4","📍S4L4H K0ND151 J4D1 P4N1K"],
  ["https://cdn2.videy.co/gj7cCedM1.mp4","📍M4L4M 1N1 B3D4"],
  ["https://cdn2.videy.co/QFkm044C3.mp4","📍K3J4D14N S1NGK4T B1K1N 51MP4N"],
  ["https://cdn2.videy.co/KXfRAsBh1.mp4","📍T4K B154 LVP4R D4R1 P1K1R4N"],
  ["https://cdn2.videy.co/0Mxm0gUx1.mp4","📍K3S4L4H4N Y4NG B3RVL4NG"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
